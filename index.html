    return React.createElement(Tag, { className, style }, text);
  }

  // Helper: shallow update a path inside the data tree
  function setAtPath(obj, path, value) {
    if (path.length === 0) return value;
    const [head, ...rest] = path;
    const isArr = Array.isArray(obj);
    const copy = isArr ? obj.slice() : { ...obj };
    copy[head] = setAtPath(obj?.[head] ?? (typeof rest[0] === 'number' ? [] : {}), rest, value);
    return copy;
  }

  // ============ Hexagon (RIASEC profile) ============
  function Hex({ scores }) {
    const th = ["R","I","A","S","E","C"];
    const cx = 120, cy = 120, oR = 90, step = (Math.PI * 2) / 6;
    const gp = (i, r) => { const a = -Math.PI / 2 + i * step; return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; };
    const hp = th.map((_, i) => gp(i, oR).join(",")).join(" ");
    const mp = th.map((_, i) => gp(i, oR * 0.5).join(",")).join(" ");
    const dp = th.map((t, i) => gp(i, Math.max(oR * 0.15, (scores[t] / 2) * oR)).join(",")).join(" ");
    return (
      <svg viewBox="0 0 240 240" style={{ width: "100%", maxWidth: 240, margin: "0 auto", display: "block" }}>
        <polygon points={hp} fill="none" stroke="#e0d8c8" strokeWidth="1" />
        <polygon points={mp} fill="none" stroke="#e0d8c8" strokeWidth="0.5" strokeDasharray="3,3" />
        {th.map((_, i) => { const [x, y] = gp(i, oR); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e0d8c8" strokeWidth="0.5" />; })}
        <polygon points={dp} fill={`${GOLD}40`} stroke={GOLD} strokeWidth="2" />
        {th.map((t, i) => { const [x, y] = gp(i, oR + 18); return <text key={t} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="700" fill={scores[t] >= 1 ? NAVY : "#aaa"}>{t}</text>; })}
      </svg>
    );
  }

  // ============ Pathway Finder ============
  function PathwayFinder({ data, update }) {
    const f = data.finder;
    const [ph, setPh] = useState("intro");
    const [rs, setRs] = useState(0);
    const [rsc, setRsc] = useState({ R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 });
    const [ls, setLs] = useState(0);
    const [ps, setPs] = useState({ B: 0, A: 0 });
    const [cs, setCs] = useState(0);
    const [nat, setNat] = useState("");
    const [car, setCar] = useState(null);

    const total = 15;
    const cur = ph === "riasec" ? rs + 1 : ph === "learn" ? 7 + ls : ph === "ctx" ? 12 + cs : 0;

    const hR = (th) => { const n = { ...rsc, [th]: rsc[th] + 1 }; setRsc(n); if (rs + 1 >= f.riasecQs.length) { setPh("learn"); } else { setRs(rs + 1); } };
    const hL = (p) => { const n = { ...ps, [p]: ps[p] + 2 }; setPs(n); if (ls + 1 >= f.learnQs.length) { setPh("ctx"); } else { setLs(ls + 1); } };
    const hC = (v) => {
      if (cs === 0) { setNat(v); setCs(1); }
      else if (cs === 1) { const o = f.uniOpts.find(x => x.t === v); if (o?.a) setPs(p => ({ ...p, [o.a]: p[o.a] + 2 })); setCs(2); }
      else if (cs === 2) { setCar(f.carOpts.find(c => c.t === v)); if (["Jordanian","Egyptian","Palestinian","Syrian"].includes(nat)) setCs(3); else setPh("result"); }
      else if (cs === 3) { if (v === "Essential") setPs(p => ({ ...p, B: p.B + 1 })); setPh("result"); }
    };
    const reset = () => { setPh("intro"); setRs(0); setRsc({ R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 }); setLs(0); setPs({ B: 0, A: 0 }); setCs(0); setNat(""); setCar(null); };

    const card = { background: "#fff", borderRadius: 12, padding: 20, border: "1px solid #e0d8c8" };
    const ob = (fn, txt, key) => (
      <button key={key} onClick={fn} style={{ width: "100%", padding: "14px", background: LIGHT_GOLD, border: "1px solid #e0d8c8", borderRadius: 10, cursor: "pointer", textAlign: "left", fontSize: 14, color: NAVY, fontWeight: 500, marginBottom: 8 }}
        onMouseEnter={e => { e.target.style.borderColor = GOLD; }}
        onMouseLeave={e => { e.target.style.borderColor = "#e0d8c8"; }}>{txt}</button>
    );

    if (ph === "intro") return (
      <div style={card}>
        <Editable as="h3" value={f.introTitle} onChange={v => update(['finder', 'introTitle'], v)}
          style={{ color: NAVY, margin: "0 0 8px", fontSize: 18 }} />
        <Editable as="p" multiline value={f.introDesc} onChange={v => update(['finder', 'introDesc'], v)}
          style={{ fontSize: 13, color: "#555", lineHeight: 1.6, margin: "0 0 12px" }} />
        <Editable as="p" multiline value={f.introNote} onChange={v => update(['finder', 'introNote'], v)}
          style={{ fontSize: 11, color: "#999", margin: "0 0 16px" }} />
        <button onClick={() => setPh("riasec")} style={{ padding: "12px 28px", background: GOLD, color: NAVY, border: "none", borderRadius: 8, cursor: "pointer", fontSize: 15, fontWeight: 700 }}>
          <Editable value={f.startButton} onChange={v => update(['finder', 'startButton'], v)} />
        </button>
      </div>
    );

    if (ph === "result") {
      const tot = ps.B + ps.A; const bP = tot > 0 ? Math.round((ps.B / tot) * 100) : 50; const aP = 100 - bP;
      const rec = bP >= 75 ? "resultStrongB" : bP >= 60 ? "resultLeanB" : bP >= 40 ? "resultEither" : bP >= 25 ? "resultLeanA" : "resultStrongA";
      const top3 = Object.entries(rsc).sort((a, b) => b[1] - a[1]).filter(e => e[1] > 0).slice(0, 3);
      const eqText = (f.equivalencyNoteText || '').replace('{nat}', nat);
      return (
        <div style={card}>
          <Editable as="h3" value={f.resultsTitle} onChange={v => update(['finder', 'resultsTitle'], v)}
            style={{ color: NAVY, margin: "0 0 16px", fontSize: 18 }} />
          <Editable as="p" value={f.pathwayFitLabel} onChange={v => update(['finder', 'pathwayFitLabel'], v)}
            style={{ fontSize: 12, color: "#888", margin: "0 0 6px", fontWeight: 600 }} />
          <div style={{ display: "flex", gap: 4, marginBottom: 8, height: 36, borderRadius: 8, overflow: "hidden" }}>
            <div style={{ width: `${Math.max(aP, 10)}%`, background: GOLD, display: "flex", alignItems: "center", justifyContent: "center", color: NAVY, fontSize: 12, fontWeight: 700 }}>🇺🇸 {aP}%</div>
            <div style={{ width: `${Math.max(bP, 10)}%`, background: NAVY, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12, fontWeight: 700 }}>🇬🇧 {bP}%</div>
          </div>
          <Editable as="p" multiline value={f[rec]} onChange={v => update(['finder', rec], v)}
            style={{ fontSize: 14, color: "#333", lineHeight: 1.6, margin: "0 0 20px" }} />
          <Editable as="p" value={f.interestProfileLabel} onChange={v => update(['finder', 'interestProfileLabel'], v)}
            style={{ fontSize: 12, color: "#888", margin: "0 0 10px", fontWeight: 600 }} />
          <Hex scores={rsc} />
          <div style={{ marginTop: 12 }}>{top3.map(([t]) => (
            <div key={t} style={{ marginBottom: 8, padding: "8px 10px", background: LIGHT_GOLD, borderRadius: 8, borderLeft: `3px solid ${GOLD}` }}>
              <Editable value={f.riasecLabels[t]} onChange={v => update(['finder', 'riasecLabels', t], v)}
                style={{ fontWeight: 700, color: NAVY, fontSize: 13 }} />
              <Editable as="p" multiline value={f.riasecDesc[t]} onChange={v => update(['finder', 'riasecDesc', t], v)}
                style={{ fontSize: 12, color: "#555", margin: "2px 0 0" }} />
            </div>
          ))}</div>
          {top3.length > 0 && (
            <div style={{ marginTop: 16 }}>
              <Editable as="p" value={f.suggestedSubjectsLabel} onChange={v => update(['finder', 'suggestedSubjectsLabel'], v)}

              <p style={{ fontSize: 13, color: "#333", margin: 0 }}>{top3.map(([t]) => f.riasecSubs[t]).join(", ")}</p>
            </div>
          )}
          {car?.s && (
            <div style={{ marginTop: 12 }}>
              <p style={{ fontSize: 12, color: "#888", margin: "0 0 4px", fontWeight: 600 }}>{f.forCareerLabel} {car.t.toUpperCase()}</p>
              <p style={{ fontSize: 13, color: "#333", margin: 0 }}><Editable value={f.keySubjectsLabel} onChange={v => update(['finder', 'keySubjectsLabel'], v)} /> {car.s}</p>
            </div>
          )}
          {["Jordanian","Egyptian","Palestinian","Syrian"].includes(nat) && (
            <div style={{ marginTop: 16, padding: 12, background: "#fff8eb", borderRadius: 8, border: `1px solid ${GOLD}40` }}>
              <Editable as="p" value={f.equivalencyNoteLabel} onChange={v => update(['finder', 'equivalencyNoteLabel'], v)}
                style={{ fontSize: 12, color: GOLD, fontWeight: 700, margin: "0 0 4px" }} />
              <p style={{ fontSize: 12, color: "#555", margin: 0, lineHeight: 1.5 }}>{eqText}</p>
            </div>
          )}
          <Editable as="p" multiline value={f.disclaimer} onChange={v => update(['finder', 'disclaimer'], v)}
            style={{ fontSize: 11, color: "#999", fontStyle: "italic", marginTop: 16, lineHeight: 1.5 }} />
          <button onClick={reset} style={{ marginTop: 12, padding: "10px 20px", background: NAVY, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600 }}>
            <Editable value={f.takeAgainBtn} onChange={v => update(['finder', 'takeAgainBtn'], v)} />
          </button>
        </div>
      );
    }

    const pPct = (cur / total) * 100;
    let label = "", q = "", opts = [];
    if (ph === "riasec") {
      label = f.part1Label; q = f.part1Q;
      const qd = f.riasecQs[rs];
      opts = [{ t: qd.a.t, fn: () => hR(qd.a.th), path: ['finder', 'riasecQs', rs, 'a', 't'] },
              { t: qd.b.t, fn: () => hR(qd.b.th), path: ['finder', 'riasecQs', rs, 'b', 't'] }];
    }
    else if (ph === "learn") {
      label = f.part2Label; q = f.part2Q;
      const qd = f.learnQs[ls];
      opts = [{ t: qd.a.t, fn: () => hL(qd.a.p), path: ['finder', 'learnQs', ls, 'a', 't'] },
              { t: qd.b.t, fn: () => hL(qd.b.p), path: ['finder', 'learnQs', ls, 'b', 't'] }];
    }
    else if (ph === "ctx") {
      label = f.part3Label;
      if (cs === 0) { q = f.qNationality; opts = f.natOpts.map((n, i) => ({ t: n, fn: () => hC(n), path: ['finder', 'natOpts', i] })); }
      else if (cs === 1) { q = f.qUniversity; opts = f.uniOpts.map((o, i) => ({ t: o.t, fn: () => hC(o.t), path: ['finder', 'uniOpts', i, 't'] })); }
      else if (cs === 2) { q = f.qCareer; opts = f.carOpts.map((c, i) => ({ t: c.t, fn: () => hC(c.t), path: ['finder', 'carOpts', i, 't'] })); }
      else { q = f.qEquivalency; opts = f.equivOpts.map((o, i) => ({ t: o.t, fn: () => hC(o.v), path: ['finder', 'equivOpts', i, 't'] })); }
    }

    const partLabelPath = ph === "riasec" ? ['finder', 'part1Label'] : ph === "learn" ? ['finder', 'part2Label'] : ['finder', 'part3Label'];
    const qPath = ph === "riasec" ? ['finder', 'part1Q'] : ph === "learn" ? ['finder', 'part2Q'] :
                  cs === 0 ? ['finder', 'qNationality'] : cs === 1 ? ['finder', 'qUniversity'] :
                  cs === 2 ? ['finder', 'qCareer'] : ['finder', 'qEquivalency'];

    return (
      <div style={card}>
        <div style={{ height: 4, background: "#e0d8c8", borderRadius: 2, marginBottom: 12, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pPct}%`, background: GOLD, borderRadius: 2, transition: "width 0.3s" }} />
        </div>
        <Editable as="p" value={label} onChange={v => update(partLabelPath, v)}
          style={{ fontSize: 11, color: GOLD, fontWeight: 600, margin: "0 0 2px" }} />
        <p style={{ fontSize: 11, color: "#aaa", margin: "0 0 12px" }}>{f.questionLabel} {cur} {f.ofLabel} {total}</p>
        <Editable as="h3" multiline value={q} onChange={v => update(qPath, v)}
          style={{ color: NAVY, margin: "0 0 14px", fontSize: 16, lineHeight: 1.4 }} />
        {opts.map((o, i) => (
          <div key={i}>
            <button onClick={o.fn} style={{ width: "100%", padding: "14px", background: LIGHT_GOLD, border: "1px solid #e0d8c8", borderRadius: 10, cursor: "pointer", textAlign: "left", fontSize: 14, color: NAVY, fontWeight: 500, marginBottom: 8 }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = GOLD; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#e0d8c8"; }}>
              <Editable value={o.t} onChange={v => update(o.path, v)} />
            </button>
          </div>
        ))}
      </div>
    );
  }

  // ============ Countdown ============
  function Countdown() {
    const [now, setNow] = useState(() => new Date());
    useEffect(() => {
      const id = setInterval(() => setNow(new Date()), 1000);
      return () => clearInterval(id);
    }, []);

    const diff = EVENT_START.getTime() - now.getTime();
    const isInProgress = diff <= 0 && now < EVENT_END;
    const isPast = now >= EVENT_END;

    if (isInProgress) {
      return (
        <div style={{ textAlign: 'center', padding: '8px 0' }}>
          <p style={{ margin: 0, fontSize: 18, fontWeight: 700, color: NAVY }}>🎉 The event is happening now</p>
          <p style={{ margin: '4px 0 0', fontSize: 13, color: '#666' }}>Welcome — please make your way to Gate 15</p>
        </div>
      );
    }
    if (isPast) {
      return (
        <div style={{ textAlign: 'center', padding: '8px 0' }}>
          <p style={{ margin: 0, fontSize: 16, fontWeight: 700, color: NAVY }}>Thank you for joining us</p>
          <p style={{ margin: '4px 0 0', fontSize: 13, color: '#666' }}>Hope to see you again soon</p>
        </div>
      );
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);
    const pad = (n) => String(n).padStart(2, '0');

    const cell = {
      background: '#fff',
      borderRadius: 10,
      padding: '14px 8px',
      minWidth: 64,
      flex: 1,
      maxWidth: 100,
      border: '1px solid #e0d8c8',
      boxShadow: '0 2px 6px rgba(12, 45, 84, 0.06)'
    };
    const num = { fontSize: 32, fontWeight: 800, color: NAVY, lineHeight: 1, fontVariantNumeric: 'tabular-nums' };
    const lbl = { fontSize: 10, fontWeight: 700, color: GOLD, textTransform: 'uppercase', letterSpacing: 0.5, marginTop: 6 };

    return (
      <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap', maxWidth: 480, margin: '0 auto' }}>
        <div style={cell}><div style={num}>{days}</div><div style={lbl}>Days</div></div>
        <div style={cell}><div style={num}>{pad(hours)}</div><div style={lbl}>Hours</div></div>
        <div style={cell}><div style={num}>{pad(minutes)}</div><div style={lbl}>Min</div></div>
        <div style={cell}><div style={num}>{pad(seconds)}</div><div style={lbl}>Sec</div></div>
      </div>
    );
  }

  // ============ Add to Calendar ============
  function AddToCalendar() {
    const [open, setOpen] = useState(false);
    const wrapRef = useRef(null);

    useEffect(() => {
      if (!open) return;
      const onDoc = (e) => {
        if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
      };
      document.addEventListener('mousedown', onDoc);
      return () => document.removeEventListener('mousedown', onDoc);
    }, [open]);

    // ICS-style timestamp: 20260429T140000Z
    const fmtUTC = (d) => d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');

    const googleUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
      + '&text=' + encodeURIComponent(EVENT_TITLE)
      + '&dates=' + fmtUTC(EVENT_START) + '/' + fmtUTC(EVENT_END)
      + '&location=' + encodeURIComponent(EVENT_LOCATION)
      + '&details=' + encodeURIComponent(EVENT_DESCRIPTION);

    const outlookUrl = 'https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
      + '&subject=' + encodeURIComponent(EVENT_TITLE)
      + '&startdt=' + EVENT_START.toISOString()
      + '&enddt=' + EVENT_END.toISOString()
      + '&location=' + encodeURIComponent(EVENT_LOCATION)
      + '&body=' + encodeURIComponent(EVENT_DESCRIPTION);

    const downloadIcs = () => {
      const escape = (s) => String(s).replace(/\\/g, '\\\\').replace(/,/g, '\\,').replace(/;/g, '\\;').replace(/\n/g, '\\n');
      const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//AIS//Grade 9 Pathway Hub//EN',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        'BEGIN:VEVENT',
        'UID:ais-grade9-orientation-2026@ais.sch.sa',
        'DTSTAMP:' + fmtUTC(new Date()),
        'DTSTART:' + fmtUTC(EVENT_START),
        'DTEND:' + fmtUTC(EVENT_END),
        'SUMMARY:' + escape(EVENT_TITLE),
        'LOCATION:' + escape(EVENT_LOCATION),
        'DESCRIPTION:' + escape(EVENT_DESCRIPTION),
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');

      const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'AIS-Grade9-Orientation-2026.ics';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setOpen(false);
    };

    const optionStyle = {
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '11px 14px', textDecoration: 'none', color: NAVY,
      fontSize: 13, fontWeight: 500, cursor: 'pointer',
      background: 'none', border: 'none', width: '100%', textAlign: 'left',
      fontFamily: 'inherit'
    };

    return (
      <div ref={wrapRef} style={{ position: 'relative', display: 'inline-block' }}>
        <button onClick={() => setOpen(!open)}
          style={{
            background: NAVY, color: '#fff', border: 'none',
            padding: '12px 22px', borderRadius: 10,
            fontSize: 14, fontWeight: 700, cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', gap: 8,
            fontFamily: 'inherit',
            boxShadow: '0 2px 8px rgba(12, 45, 84, 0.18)'
          }}>
          📅 Add to Calendar <span style={{ fontSize: 10 }}>{open ? '▲' : '▼'}</span>
        </button>
        {open && (
          <div style={{
            position: 'absolute', top: 'calc(100% + 6px)', left: '50%', transform: 'translateX(-50%)',
            background: '#fff', border: '1px solid #e0d8c8', borderRadius: 10,
            boxShadow: '0 8px 24px rgba(12, 45, 84, 0.18)',
            minWidth: 220, zIndex: 80, overflow: 'hidden'
          }}
          onMouseDown={(e) => e.stopPropagation()}>
            <a href={googleUrl} target="_blank" rel="noopener noreferrer"
               onClick={() => setOpen(false)} style={optionStyle}
               onMouseEnter={(e) => e.currentTarget.style.background = LIGHT_GOLD}
               onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
              <span style={{ fontSize: 18 }}>🟦</span> Google Calendar
            </a>
            <button onClick={downloadIcs} style={optionStyle}
               onMouseEnter={(e) => e.currentTarget.style.background = LIGHT_GOLD}
               onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
              <span style={{ fontSize: 18 }}>🍎</span> Apple Calendar (.ics)
            </button>
            <a href={outlookUrl} target="_blank" rel="noopener noreferrer"
               onClick={() => setOpen(false)} style={optionStyle}
               onMouseEnter={(e) => e.currentTarget.style.background = LIGHT_GOLD}
               onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
              <span style={{ fontSize: 18 }}>📧</span> Outlook.com
            </a>
            <button onClick={downloadIcs} style={{ ...optionStyle, borderTop: '1px solid #f0e8d8', color: '#666' }}
               onMouseEnter={(e) => e.currentTarget.style.background = LIGHT_GOLD}
               onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
              <span style={{ fontSize: 18 }}>⬇️</span> Download .ics file
            </button>
          </div>
        )}
      </div>
    );
  }

                      style={{ fontSize: 12, fontWeight: 700, color: GOLD }} />
                    <Editable as="h4" value={item.title} onChange={v => update(['dates', 'items', i, 'title'], v)}
                      style={{ margin: "4px 0", color: NAVY, fontSize: 14 }} />
                    <Editable as="p" multiline value={item.description} onChange={v => update(['dates', 'items', i, 'description'], v)}
                      style={{ margin: 0, fontSize: 13, color: "#666", lineHeight: 1.5 }} />
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* Apply — main CTA */}
          <section id="apply" style={{ ...ss, background: NAVY, maxWidth: "100%", padding: "56px 16px" }}>
            <div style={{ maxWidth: 640, margin: "0 auto", textAlign: "center" }}>
              <Editable as="h2" value={data.apply.sectionTitle} onChange={v => update(['apply', 'sectionTitle'], v)}
                style={{ fontSize: 28, fontWeight: 800, color: "#fff", margin: "0 0 10px" }} />
              <Editable as="p" multiline value={data.apply.sectionSub} onChange={v => update(['apply', 'sectionSub'], v)}
                style={{ color: "rgba(255,255,255,0.75)", fontSize: 15, margin: "0 0 16px", lineHeight: 1.6 }} />
              <Editable as="p" value={data.apply.deadline} onChange={v => update(['apply', 'deadline'], v)}
                style={{ color: GOLD, fontSize: 16, fontWeight: 700, margin: "0 0 28px" }} />
              <a href="https://forms.gle/5jxSbPWD9rLgQn4h6" target="_blank" rel="noopener noreferrer"
                style={{ display: "inline-block", padding: "18px 48px", background: GOLD, color: NAVY, borderRadius: 12, textDecoration: "none", fontWeight: 800, fontSize: 18, boxShadow: "0 4px 16px rgba(237,186,29,0.35)" }}>
                <Editable value={data.apply.buttonText} onChange={v => update(['apply', 'buttonText'], v)} />
              </a>
              <Editable as="p" multiline value={data.apply.helpText} onChange={v => update(['apply', 'helpText'], v)}
                style={{ color: "rgba(255,255,255,0.55)", fontSize: 12, marginTop: 20, lineHeight: 1.6, maxWidth: 420, marginLeft: "auto", marginRight: "auto" }} />
              <Editable as="p" value={data.apply.note} onChange={v => update(['apply', 'note'], v)}
                style={{ color: "rgba(255,255,255,0.4)", fontSize: 11, marginTop: 8 }} />
            </div>
          </section>

          {/* Ask */}
          <section id="ask" style={{ ...ss, background: LIGHT_GOLD, maxWidth: "100%", padding: "48px 16px" }}>
            <div style={{ maxWidth: 800, margin: "0 auto", textAlign: "center" }}>
              <Editable as="h2" value={data.ask.title} onChange={v => update(['ask', 'title'], v)}
                style={{ fontSize: 24, fontWeight: 800, color: NAVY, margin: "0 0 8px" }} />
              <Editable as="p" multiline value={data.ask.description} onChange={v => update(['ask', 'description'], v)}
                style={{ color: "#666", fontSize: 14, marginTop: 0, marginBottom: 20, lineHeight: 1.5 }} />
              <a href="https://forms.gle/n7tLEw9q5VdzvrqX7" target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", padding: "14px 32px", background: NAVY, color: "#fff", borderRadius: 10, textDecoration: "none", fontWeight: 700, fontSize: 16 }}>
                <Editable value={data.ask.buttonText} onChange={v => update(['ask', 'buttonText'], v)} />
              </a>
              <Editable as="p" value={data.ask.note} onChange={v => update(['ask', 'note'], v)}
                style={{ fontSize: 12, color: "#999", marginTop: 12 }} />
            </div>
          </section>

          {/* Contact */}
          <section id="contact" style={ss}>
            <SectionTitle sub={data.contact.sectionSub} subPath={['contact', 'sectionSub']} update={update}>
              <Editable value={data.contact.sectionTitle} onChange={v => update(['contact', 'sectionTitle'], v)} />
            </SectionTitle>
            <div style={{ display: "grid", gap: 12, gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))" }}>
              {data.contact.cards.map((c, i) => {
                const accentColor = c.accent === 'gold' ? GOLD : NAVY;
                return (
                  <div key={i} style={{ background: "#fff", borderRadius: 10, padding: 16, border: "1px solid #e0d8c8", borderTop: `3px solid ${accentColor}` }}>
                    <Editable as="p" value={c.section} onChange={v => update(['contact', 'cards', i, 'section'], v)}
                      style={{ fontSize: 11, fontWeight: 700, color: accentColor, margin: "0 0 8px", textTransform: "uppercase", letterSpacing: 0.5 }} />
                    <Editable as="p" value={c.name} onChange={v => update(['contact', 'cards', i, 'name'], v)}
                      style={{ fontSize: 15, fontWeight: 700, color: NAVY, margin: "0 0 2px" }} />
                    <Editable as="p" value={data.contact.roleLabel} onChange={v => update(['contact', 'roleLabel'], v)}
                      style={{ fontSize: 12, color: "#888", margin: "0 0 8px" }} />
                    <a href={`mailto:${c.email}`} style={{ fontSize: 13, color: NAVY, textDecoration: "none", fontWeight: 500 }}>
                      📧 <Editable value={c.email} onChange={v => update(['contact', 'cards', i, 'email'], v)} />
                    </a>
                  </div>
                );
              })}
            </div>
          </section>

          {/* Footer */}
          <footer style={{ background: NAVY, padding: "24px 16px", textAlign: "center" }}>
            <img src={EMBLEM} alt="AIS" style={{ width: 40, height: 40, marginBottom: 8 }} />
            <Editable as="p" value={data.footer.schoolName} onChange={v => update(['footer', 'schoolName'], v)}
              style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, margin: "0 0 4px" }} />
            <Editable as="p" value={data.footer.address} onChange={v => update(['footer', 'address'], v)}
              style={{ color: "rgba(255,255,255,0.4)", fontSize: 11, margin: "0 0 4px" }} />
            <Editable as="p" value={data.footer.contact} onChange={v => update(['footer', 'contact'], v)}
              style={{ color: "rgba(255,255,255,0.3)", fontSize: 11, margin: 0 }} />
          </footer>

          <a href="https://forms.gle/5jxSbPWD9rLgQn4h6" target="_blank" rel="noopener noreferrer" style={{ position: "fixed", bottom: 20, right: 20, height: 48, borderRadius: 24, background: GOLD, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 14px rgba(12,45,84,0.3)", textDecoration: "none", fontSize: 13, fontWeight: 800, zIndex: 90, color: NAVY, padding: "0 22px", gap: 6, border: `2px solid ${NAVY}` }}>📝 Apply Now</a>
        </div>
    );
  }

  // Wait for Babel + React to be ready, then mount
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
